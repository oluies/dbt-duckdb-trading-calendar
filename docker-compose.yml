services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: holiday_loader_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?SA_PASSWORD must be set in .env}
      SA_PASSWORD: ${SA_PASSWORD:?SA_PASSWORD must be set in .env}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -l 5 || exit 1
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  mssql_data:
    name: holiday_loader_mssql_data
