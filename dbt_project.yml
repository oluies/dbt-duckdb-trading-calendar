name: 'holiday_loader'
version: '1.0.0'
config-version: 2

profile: 'holiday_loader'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Country codes whose holidays are loaded into fct_holiday_calendar.
# dim_country must contain at least these codes.
#
# calendar_start_date / calendar_end_date bound BOTH the date spine
# (and thus dim_date) AND the holiday staging filter, so the
# fct_holiday_calendar -> dim_date relationship test never fails on
# pre-spine or post-spine rows. End is half-open (exclusive), matching
# dbt_utils.date_spine.
vars:
  holiday_country_codes: ['SE', 'NO', 'DK', 'FI', 'GB', 'US']
  calendar_start_date: '2015-01-01'
  calendar_end_date:   '2036-01-01'
  # Toggle for the elementary OSS observability package. Off by default
  # so the main CI / local dev runs are unaffected by elementary's tables
  # and ingest models. The .github/workflows/elementary.yml job flips
  # this to true and then publishes an HTML report via `edr report`.
  with_elementary: false

models:
  holiday_loader:
    +database: Referensdata
    +schema: azuredl
    +materialized: table
    staging:
      stg_public_holidays:
        +materialized: table
      stg_date_spine:
        +materialized: ephemeral
    marts:
      +materialized: table
  # Elementary OSS package -- observability tables that ingest dbt
  # run/test artifacts. Disabled unless var('with_elementary') is true.
  #
  # +schema: elementary composes with target.schema (dbt-duckdb default
  # 'main') into the actual schema name `main_elementary`. dbt-duckdb
  # auto-creates that schema inside the attached SQL Server -- nothing
  # to pre-create.
  #
  # +materialized: table overrides elementary's default incremental
  # materialization. Reason: dbt-duckdb's incremental path issues a
  # COMMIT against the connection after the MERGE, but the community
  # mssql ATTACH auto-commits MERGE itself, so the explicit COMMIT
  # raises `Tried to commit transaction on connection ... but it does
  # not have one open!` (dbt/adapters/duckdb/impl.py:300) and fails
  # the whole `dbt run`. Table materialization avoids the merge path
  # entirely. We lose elementary's run-history accumulation, but the
  # CI's SQL Server container is ephemeral so there's no history to
  # accumulate anyway.
  elementary:
    +enabled: "{{ var('with_elementary', false) }}"
    +database: Referensdata
    +schema: elementary
    +materialized: table

seeds:
  holiday_loader:
    +database: Referensdata
    +schema: azuredl
    dim_country:
      +column_types:
        country_code: varchar(2)
        country_name: varchar(100)
    exchange_holidays:
      +column_types:
        calendar_date: date
        exchange_code: varchar(8)
        exchange_name: varchar(100)
        country_code: varchar(2)
        holiday_name: varchar(200)
    # Frozen reference values for the dim_date week-number regression
    # test (tests/assert_dim_date_week_numbers.sql).
    expected_week_numbers:
      +column_types:
        date_day: date
        iso_week_number: integer
        iso_year: integer
        iso_year_week: varchar(8)
        us_week_number: integer
        note: varchar(100)
  elementary:
    +enabled: "{{ var('with_elementary', false) }}"
    +database: Referensdata
    +schema: elementary
