name: 'holiday_loader'
version: '1.0.0'
config-version: 2

profile: 'holiday_loader'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Country codes whose holidays are loaded into fct_holiday_calendar.
# dim_country must contain at least these codes.
#
# calendar_start_date / calendar_end_date bound BOTH the date spine
# (and thus dim_date) AND the holiday staging filter, so the
# fct_holiday_calendar -> dim_date relationship test never fails on
# pre-spine or post-spine rows. End is half-open (exclusive), matching
# dbt_utils.date_spine.
vars:
  holiday_country_codes: ['SE', 'NO', 'DK', 'FI', 'GB', 'US']
  calendar_start_date: '2015-01-01'
  calendar_end_date:   '2036-01-01'
  # Toggle for the elementary OSS observability package. Off by default
  # so the main CI / local dev runs are unaffected by elementary's tables
  # and ingest models. The .github/workflows/elementary.yml job flips
  # this to true and then publishes an HTML report via `edr report`.
  with_elementary: false

models:
  holiday_loader:
    +database: Referensdata
    +schema: azuredl
    +materialized: table
    staging:
      stg_public_holidays:
        +materialized: table
      stg_date_spine:
        +materialized: ephemeral
    marts:
      +materialized: table
  # Elementary OSS package -- observability tables that ingest dbt
  # run/test artifacts. Disabled unless var('with_elementary') is true.
  #
  # These tables are materialised in the LOCAL DuckDB file (default
  # database `holiday_loader`), NOT in the attached SQL Server -- note
  # the absence of `+database: Referensdata`. Two reasons:
  #   1. `edr report` reads these tables back out, and the community
  #      mssql extension SEGFAULTS (exit 139) on edr's query patterns
  #      when the tables live in attached SQL Server. Keeping them
  #      native to DuckDB means edr never touches the mssql extension.
  #   2. Elementary's data is ephemeral CI metadata with no SQL Server
  #      consumer, so there's nothing gained by pushing it across.
  #
  # +schema: elementary composes with target.schema (dbt-duckdb default
  # 'main') into the actual schema name `main_elementary`.
  #
  # NB: do NOT override +materialized here. Elementary's result tables
  # (elementary_test_results, dbt_run_results, ...) are INCREMENTAL: the
  # on-run-end hook appends each invocation's results, and the workflow's
  # second `dbt run --select package:elementary` pass ingests them. Forcing
  # +materialized: table makes that second pass `create or replace table`
  # the result tables empty, wiping the hook-stored test/run results -- the
  # report then shows model + test *definitions* but zero results.
  # (The table override once dodged an mssql ATTACH auto-commit error on
  # incremental MERGE; that path is gone now elementary lives in local
  # DuckDB, where incremental works normally.)
  elementary:
    +enabled: "{{ var('with_elementary', false) }}"
    +schema: elementary

seeds:
  holiday_loader:
    +database: Referensdata
    +schema: azuredl
    dim_country:
      +column_types:
        country_code: varchar(2)
        country_name: varchar(100)
    exchange_holidays:
      +column_types:
        calendar_date: date
        exchange_code: varchar(8)
        exchange_name: varchar(100)
        country_code: varchar(2)
        holiday_name: varchar(200)
  elementary:
    +enabled: "{{ var('with_elementary', false) }}"
    +schema: elementary
