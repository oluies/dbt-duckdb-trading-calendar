holiday_loader:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: 'holiday_loader.duckdb'
      # Single-threaded. The DuckDB community `mssql` extension segfaults
      # the worker (exit 139, core dumped) INTERMITTENTLY under concurrent
      # access against an attached SQL Server: at threads=4 it crashed
      # `dbt seed` (3 concurrent seeds) on main run 27032382694 yet passed
      # once on the same commit's PR (2026-06-05).
      #
      # The thread-safety fix (hugr-lab/mssql-extension PR #127, "Thread-
      # safe catalog entry lifetime") is in the v0.2.1 release (commit
      # 3c100e9, 2026-06-05) -- but `INSTALL mssql FROM community` still
      # resolves to v0.2.0 (commit da0204c, 2026-05-20), which PREDATES
      # the fix. The community-extensions CDN had not published v0.2.1
      # yet, so CI was never actually running the fixed build. Verify the
      # installed build with:
      #   SELECT extension_version FROM duckdb_extensions()
      #   WHERE extension_name='mssql';   -- commit hash, not the tag
      # Bump back to threads: 4 once that hash is 3c100e9 (v0.2.1) or
      # later AND the nightly stress workflow stays green at threads=4/8.
      threads: 1
      extensions:
        - httpfs
        - azure
        # mssql is NOT in the core DuckDB extension repo; it lives in the
        # community repo. dbt-duckdb's Extension dataclass takes `name`
        # and `repo` (NOT `repository` -- the wrong key triggers
        # "Failed to parse extension: Extension.__init__() got an
        # unexpected keyword argument 'repository'") and emits
        # `INSTALL mssql FROM community`.
        - name: mssql
          repo: community
      secrets:
        - type: azure
          provider: config
          account_name: azureopendatastorage
      settings:
        azure_transport_option_type: 'curl'
        # Path to a CA bundle DuckDB's azure extension uses for TLS.
        # Override with AZURE_CA_CERT_FILE in .env (default suits debian/ubuntu).
        ca_cert_file: "{{ env_var('AZURE_CA_CERT_FILE', '/etc/ssl/certs/ca-certificates.crt') }}"
      attach:
        - path: "Server=localhost,1433;Database=Referensdata;UID=sa;PWD={{ env_var('SA_PASSWORD') }};Encrypt=yes;TrustServerCertificate=yes"
          type: mssql
          alias: Referensdata

    # No-attach DuckDB target, used ONLY by the elementary re-ingest step
    # in .github/workflows/elementary.yml. Elementary's on-run-end hook
    # captures run/test results into its tables, but when the connection also
    # holds the community mssql ATTACH those native-DuckDB writes are left in
    # an uncommitted transaction that is discarded on close (no error) -- so
    # the elementary tables end up empty and the report shows definitions but
    # zero results. Running the ingest pass WITHOUT the attach restores normal
    # autocommit so the results persist. Same DuckDB file/schema as dev, so it
    # sees and appends to the elementary tables dev already built.
    dev_noattach:
      type: duckdb
      path: 'holiday_loader.duckdb'
      threads: 1

    # Nightly stress-test target. Used only by the
    # duckdb-mssql-nightly.yml workflow, which pre-places a freshly
    # built `mssql.duckdb_extension` (from upstream
    # hugr-lab/mssql-extension CI artifacts) into DuckDB's extension
    # cache and then runs the full pipeline at threads=4 or 8.
    #
    # Differences vs `dev`:
    #   * threads is env-driven (DBT_THREADS=4 or 8). Default 4 so a
    #     stray `--target nightly` without env doesn't accidentally
    #     fall back to threads=1.
    #   * `allow_unsigned_extensions: true` -- upstream CI builds are
    #     not code-signed.
    #
    # mssql still uses `repo: community` because dbt-duckdb 1.10 made
    # `repo` a required positional argument on its Extension dataclass
    # (dbt/adapters/duckdb/credentials.py): `- name: mssql` alone raises
    # `Extension.__init__() missing 1 required positional argument: 'repo'`
    # at config-parse time, and the install path is hardcoded as
    # `INSTALL <name> FROM <repo>` with no local-file alternative.
    #
    # Whether the pre-placed binary survives the workflow's INSTALL FROM
    # community step depends on DuckDB's cache behaviour, so the workflow
    # has a "Verify extension origin" step that prints the loaded
    # extension's install_path + version via `duckdb_extensions()`. If
    # it points at the upstream artifact we know the pre-placement won;
    # if it points at the community CDN, INSTALL clobbered our binary
    # and we're back to testing the released version.
    nightly:
      type: duckdb
      path: 'holiday_loader.duckdb'
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"
      extensions:
        - httpfs
        - azure
        - name: mssql
          repo: community
      secrets:
        - type: azure
          provider: config
          account_name: azureopendatastorage
      settings:
        azure_transport_option_type: 'curl'
        ca_cert_file: "{{ env_var('AZURE_CA_CERT_FILE', '/etc/ssl/certs/ca-certificates.crt') }}"
        allow_unsigned_extensions: true
      attach:
        - path: "Server=localhost,1433;Database=Referensdata;UID=sa;PWD={{ env_var('SA_PASSWORD') }};Encrypt=yes;TrustServerCertificate=yes"
          type: mssql
          alias: Referensdata

# ---------------------------------------------------------------------------
# Elementary CLI (`edr report`) profile.
#
# `edr report` runs Elementary's OWN bundled dbt project, which hardcodes
# `profile: elementary`. With only the `holiday_loader` profile present the
# CLI fails with `Could not find profile named 'elementary'` and no report is
# produced (the dbt pipeline itself is unaffected -- only report generation).
#
# This profile reuses the dev DuckDB connection and points at the schema the
# elementary models were materialised into: target schema `main` composed with
# `+schema: elementary` (dbt_project.yml) => `main_elementary`, inside the
# attached `Referensdata` SQL Server. `database`/`schema` are set explicitly so
# edr's read queries resolve to `Referensdata.main_elementary.<table>`.
#
# threads: 1 for the same reason as dev -- the community mssql extension is not
# safe under concurrent reads against the attached SQL Server.
# ---------------------------------------------------------------------------
# Elementary CLI (`edr report`) profile.
#
# `edr report` runs Elementary's OWN bundled dbt project, which hardcodes
# `profile: elementary`. Without this block edr fails with
# `Could not find profile named 'elementary'`.
#
# This is a PURE LOCAL DuckDB connection -- no attach, no mssql extension.
# The elementary models are materialised into the DuckDB file (schema
# `main_elementary`; see dbt_project.yml), so edr reads native DuckDB tables.
# It must NOT attach SQL Server: edr's read queries against the attached
# server segfault the community mssql extension (exit 139).
#
# path is ABSOLUTE on purpose. `edr report` runs with --project-dir pointing
# at elementary's bundled dbt project (under site-packages), and dbt-duckdb
# resolves a relative `path` against the project dir -- so a relative
# 'holiday_loader.duckdb' would open a fresh EMPTY file there instead of the
# one the main `dbt run` wrote (Catalog Error: schema main_elementary does not
# exist). GITHUB_WORKSPACE is the Actions checkout root (where the main run's
# cwd-relative file lands); locally it falls back to the current directory.
elementary:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('GITHUB_WORKSPACE', '.') }}/holiday_loader.duckdb"
      threads: 1
      schema: main_elementary
