packages:
  - package: dbt-labs/dbt_utils
    version: 1.3.0

  # Elementary OSS -- data observability. Adds models that capture dbt
  # run / test artifacts. Loaded by every `dbt deps`, but its models are
  # disabled by default via var('with_elementary'). The elementary.yml
  # workflow flips the var to true, runs the pipeline, then publishes
  # an HTML report via `edr report`.
  - package: elementary-data/elementary
    version: 0.23.1
